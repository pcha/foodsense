name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog and Version
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-count: 0
          version-file: ./.version.yml
          skip-on-empty: false

      - name: Set up JDK 17
        if: steps.changelog.outputs.skipped == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.changelog.outputs.skipped == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        if: steps.changelog.outputs.skipped == 'false'
        run: |
          ./gradlew assembleRelease \
            -PversionName=${{ steps.changelog.outputs.version }} \
            -PversionCode=${{ github.run_number }}

      - name: Create GitHub Release
        if: steps.changelog.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          files: app/build/outputs/apk/release/app-release-unsigned.apk

      # ── Play Store publishing ──────────────────────────────────────────────
      # Requires the following repository secrets:
      #   KEYSTORE_BASE64              base64-encoded .jks keystore file
      #   KEYSTORE_PASSWORD            keystore password
      #   KEY_ALIAS                    signing key alias
      #   KEY_PASSWORD                 signing key password
      #   GOOGLE_PLAY_SERVICE_ACCOUNT  Google Play service account JSON (contents)
      # ────────────────────────────────────────────────────────────────────────

      - name: Check Play Store secrets
        if: steps.changelog.outputs.skipped == 'false'
        id: play_secrets
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::Play Store publishing is not configured. To enable it, follow these steps:%0A%0A1. Create a keystore: keytool -genkey -v -keystore foodsense.jks -alias foodsense -keyalg RSA -keysize 2048 -validity 10000%0A2. Encode it: base64 -w0 foodsense.jks%0A3. Create a Google Play service account: https://play.google.com/console → Setup → API access%0A4. Add these repository secrets (Settings → Secrets → Actions):%0A   - KEYSTORE_BASE64 (output of step 2)%0A   - KEYSTORE_PASSWORD%0A   - KEY_ALIAS (e.g. foodsense)%0A   - KEY_PASSWORD%0A   - GOOGLE_PLAY_SERVICE_ACCOUNT (contents of the downloaded JSON)"
          fi

      - name: Build Release AAB
        if: steps.changelog.outputs.skipped == 'false' && steps.play_secrets.outputs.available == 'true'
        run: |
          ./gradlew bundleRelease \
            -PversionName=${{ steps.changelog.outputs.version }} \
            -PversionCode=${{ github.run_number }}

      - name: Sign AAB
        if: steps.changelog.outputs.skipped == 'false' && steps.play_secrets.outputs.available == 'true'
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Publish to Play Store (internal track)
        if: steps.changelog.outputs.skipped == 'false' && steps.play_secrets.outputs.available == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.github.pcha.foodsense.app
          releaseFiles: ${{ steps.sign.outputs.signedReleaseFile }}
          track: internal
          whatsNewDirectory: fastlane/metadata/android/en-US/changelogs
          mappingFile: app/build/outputs/mapping/release/mapping.txt
